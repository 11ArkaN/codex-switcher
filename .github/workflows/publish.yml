name: Publish Package

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type publish to confirm npm release"
        required: true
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "publish" ]; then
            echo "Release aborted: confirmation input must be exactly 'publish'."
            exit 1
          fi

      - name: Verify version is unpublished
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version > /dev/null 2>&1; then
            echo "Version already published: ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
